# log4j2 configuration for ingestion3 JAR execution.
# Spark's bundled log4j2-defaults.properties uses patterns that produce
# StatusLogger errors when running via `java -cp` instead of spark-submit.
# This file overrides those defaults with a working console appender.

status = warn
name = Ingestion3Log4j2

appender.console.type = Console
appender.console.name = console
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %-5p [%t] %c{1} - %m%n

rootLogger.level = warn
rootLogger.appenderRef.console.ref = console

# Ingestion3 application loggers at INFO level
logger.dpla.name = dpla
logger.dpla.level = info

# Suppress noisy Spark internals
logger.spark.name = org.apache.spark
logger.spark.level = warn

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = warn

logger.jetty.name = org.eclipse.jetty
logger.jetty.level = warn
